rules:
  - id: gh-actions-reusable-workflow-secrets-inherit
    message: >
      Reusable workflow is called with 'secrets: inherit', forwarding all caller secrets
      to the callee. This grants the reusable workflow access to secrets it may not need.
    severity: WARNING
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    pattern-regex: '(?is)uses\s*:\s*[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/\.github/workflows/[A-Za-z0-9_.-]+@[^ \n]+[\s\S]*?secrets\s*:\s*inherit'
    metadata:
      policy: "Supply Chain — Reusable Workflows"
      help: |
        ## Summary
        `secrets: inherit` passes every secret from the caller to the reusable workflow.
        If the reusable workflow is in a different repository or is less trusted, it gains
        unnecessary access to sensitive credentials.

        ## Remediation
        Pass only the secrets the reusable workflow actually needs:
        ```yaml
        jobs:
          call-workflow:
            uses: org/repo/.github/workflows/ci.yml@main
            secrets:
              NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        ```

        ## References
        - https://docs.github.com/en/actions/using-workflows/reusing-workflows#passing-secrets-to-nested-workflows
