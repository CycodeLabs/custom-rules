rules:
  - id: gh-actions-secrets-used-in-pr
    message: >
      Secrets are referenced in a workflow triggered by pull_request. Secrets are
      unavailable to forked PRs by default, indicating a possible misconfiguration
      or trust assumption.
    severity: WARNING
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    patterns:
      - pattern-regex: '(?i)on\s*:\s*(?:\[?\s*pull_request\b|(?:.*\n)*\s*pull_request\s*:)'
      - pattern-regex: '\$\{\{\s*secrets\.'
    metadata:
      policy: "Secrets — Misuse in PR Context"
      help: |
        ## Summary
        GitHub does not pass repository secrets to workflows triggered by `pull_request`
        from forks. Referencing secrets in this context either fails silently (empty values)
        or indicates the workflow assumes all PRs are trusted (same-repo only). If the
        repository ever enables fork PRs, secrets could be exposed.

        ## Remediation
        - Remove secret usage from `pull_request`-triggered workflows where possible.
        - If secrets are needed, use `pull_request_target` with extreme caution and
          never check out the PR head code.

        ## References
        - https://docs.github.com/en/actions/security-guides/using-secrets-in-github-actions#using-secrets-in-a-workflow
