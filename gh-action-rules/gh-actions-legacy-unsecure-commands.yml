rules:
  - id: gh-actions-legacy-unsecure-commands
    message: >
      Legacy workflow commands are enabled (ACTIONS_ALLOW_UNSECURE_COMMANDS=true). This
      re-enables deprecated ::set-env and ::add-path commands that allow any step to
      modify environment variables and PATH for subsequent steps.
    severity: WARNING
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    pattern-regex: '(?i)ACTIONS_ALLOW_UNSECURE_COMMANDS\s*:\s*true'
    metadata:
      policy: "Miscellaneous — Legacy Insecure Commands"
      help: |
        ## Summary
        The `::set-env` and `::add-path` workflow commands were deprecated because they
        allow any step (including compromised third-party actions) to silently modify
        environment variables and PATH for all subsequent steps. Setting
        `ACTIONS_ALLOW_UNSECURE_COMMANDS=true` re-enables this dangerous behavior.

        ## Remediation
        Remove `ACTIONS_ALLOW_UNSECURE_COMMANDS` and use the modern equivalents:
        ```yaml
        # Instead of ::set-env
        echo "MY_VAR=value" >> "$GITHUB_ENV"
        # Instead of ::add-path
        echo "/my/path" >> "$GITHUB_PATH"
        ```

        ## References
        - https://github.blog/changelog/2020-10-01-github-actions-deprecating-set-env-and-add-path-commands/
