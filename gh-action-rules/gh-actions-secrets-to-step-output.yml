rules:
  - id: gh-actions-secrets-to-step-output
    message: >
      Secrets are written to $GITHUB_OUTPUT or $GITHUB_ENV via shell redirection. This
      persists the secret value as a step output or environment variable accessible to
      all subsequent steps, expanding the exposure surface.
    severity: ERROR
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    pattern-either:
      - pattern-regex: '(?mis)^\s*-\s*run\s*:(?:[^\n]*|\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?)\$\{\{\s*secrets\.[^\n]*>>\s*"\$GITHUB_(?:OUTPUT|ENV)"'
      - pattern-regex: '(?mis)^\s*-\s*run\s*:(?:[^\n]*|\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?)\$\{\{\s*secrets\.[^\n]*>>\s*\$GITHUB_(?:OUTPUT|ENV)\b'
    metadata:
      policy: "Secrets — Persistence via Step Outputs"
      help: |
        ## Summary
        Writing `${{ secrets.* }}` to `$GITHUB_OUTPUT` makes the secret available as a
        step output that subsequent steps (and actions) can read via
        `${{ steps.<id>.outputs.<key> }}`. Writing to `$GITHUB_ENV` makes it an environment
        variable for all subsequent steps. Both patterns expand the secret's exposure
        surface beyond the single step that needs it, and risk logging if any downstream
        step prints the value.

        ## Remediation
        - Pass secrets directly to the steps that need them via `env:` blocks.
        - Never persist secrets as step outputs or workflow environment variables.
        ```yaml
        # Instead of writing to GITHUB_OUTPUT:
        - run: call-api --token "$MY_TOKEN"
          env:
            MY_TOKEN: ${{ secrets.API_TOKEN }}
        ```

        ## References
        - https://docs.github.com/en/actions/security-guides/using-secrets-in-github-actions
