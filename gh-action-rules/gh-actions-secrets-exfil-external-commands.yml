rules:
  - id: gh-actions-secrets-exfil-external-commands
    message: >
      Secrets are used alongside network-capable commands (curl, wget, nc, ncat, netcat)
      in the same run block. This pattern can exfiltrate secrets to external endpoints.
    severity: ERROR
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    pattern-either:
      - pattern-regex: '(?mis)^\s*-\s*run\s*:[^\n]*\b(?:curl|wget|nc|ncat|netcat)\b[^\n]*\$\{\{\s*secrets\.'
      - pattern-regex: '(?mis)^\s*-\s*run\s*:\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?.*\b(?:curl|wget|nc|ncat|netcat)\b.*\$\{\{\s*secrets\.'
      - pattern-regex: '(?mis)^\s*-\s*run\s*:[^\n]*\$\{\{\s*secrets\.[^\n]*\b(?:curl|wget|nc|ncat|netcat)\b'
      - pattern-regex: '(?mis)^\s*-\s*run\s*:\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?.*\$\{\{\s*secrets\.[^\n]*\b(?:curl|wget|nc|ncat|netcat)\b'
    metadata:
      policy: "Secrets — Exfiltration"
      help: |
        ## Summary
        Combining secrets with network tools like `curl`, `wget`, or `nc` in the same
        command can send credentials to attacker-controlled endpoints. Even in trusted
        workflows, HTTP redirects or DNS hijacking can divert credentials.

        ## Remediation
        - Use dedicated actions for authenticated API calls (e.g., `aws-actions/configure-aws-credentials`).
        - If HTTP calls are necessary, pass secrets via masked environment variables and
          hardcode the destination URL.
        - Never pass secrets as URL parameters or HTTP body content in ad-hoc curl commands.

        ## References
        - https://docs.github.com/en/actions/security-guides/using-secrets-in-github-actions
