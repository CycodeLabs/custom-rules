rules:
  - id: gh-actions-checkout-no-persist-credentials-false
    message: >
      actions/checkout is used without 'persist-credentials: false'. By default, the
      GITHUB_TOKEN is stored in .git/config and is readable by all subsequent steps,
      third-party actions, and compromised dependencies.
    severity: WARNING
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    patterns:
      - pattern-regex: '(?i)uses\s*:\s*actions/checkout@[^ \n]+'
      - pattern-not-regex: '(?is)uses\s*:\s*actions/checkout@[^ \n]+[\s\S]{0,300}?persist-credentials\s*:\s*false'
    metadata:
      policy: "Credentials — Persisted Token on Disk"
      help: |
        ## Summary
        By default, `actions/checkout` stores the GITHUB_TOKEN in `.git/config`. Any
        subsequent step — including third-party actions, test suites, or build scripts —
        can read this token and use it to push code, create releases, or call the
        GitHub API with the workflow's permissions.

        Note: this rule may not fire when multiple checkout steps exist in the same file
        and at least one has `persist-credentials: false` (Semgrep regex limitation).

        ## Remediation
        Always set `persist-credentials: false`:
        ```yaml
        - uses: actions/checkout@v4
          with:
            persist-credentials: false
        ```
        If git push is needed later, configure credentials explicitly for that step only.

        ## References
        - https://github.com/actions/checkout#usage
