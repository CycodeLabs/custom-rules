rules:
  - id: gh-actions-prtarget-write-and-secrets
    message: >
      Workflow triggered by pull_request_target has write permissions and accesses secrets.
      This is a critical combination: untrusted PRs can trigger code execution with
      elevated privileges and credentials.
    severity: ERROR
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    patterns:
      - pattern-regex: '(?i)pull_request_target\s*:'
      - pattern-regex: '(?im)^\s+\w[\w-]*\s*:\s*write\b'
      - pattern-regex: '\$\{\{\s*secrets\.'
    metadata:
      policy: "Pull Request Target — Privileged Secrets Access"
      help: |
        ## Summary
        A `pull_request_target` workflow with write permissions AND secret access is the
        highest-risk combination. An attacker can open a PR to trigger the workflow, and
        if the workflow checks out or processes PR code, they gain write access to the
        repository and all referenced secrets.

        ## Remediation
        - Remove write permissions or secret access from `pull_request_target` workflows.
        - Split into a safe labeling/approval workflow and a separate trusted execution workflow.
        - If checkout of PR code is required, do it in a sandboxed, unprivileged job.

        ## References
        - https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
