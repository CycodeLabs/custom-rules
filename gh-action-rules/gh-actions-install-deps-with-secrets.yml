rules:
  - id: gh-actions-install-deps-with-secrets
    message: >
      Workflow installs dependencies (npm install, pip install, etc.) and also accesses
      secrets. Compromised packages can exfiltrate secrets via install-time scripts.
    severity: WARNING
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    patterns:
      - pattern-regex: '(?mis)^\s*-\s*run\s*:(?:[^\n]*|\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?)(?:npm\s+(?:install|ci)|yarn(?:\s+install)?|pip3?\s+install|pipenv\s+install|poetry\s+install|bundle\s+install|go\s+mod\s+download|cargo\s+(?:build|fetch)|composer\s+install)\b'
      - pattern-regex: '\$\{\{\s*secrets\.'
    metadata:
      policy: "Build/Deploy — Dependency Install with Secrets"
      help: |
        ## Summary
        Dependency installation runs arbitrary code: npm preinstall/postinstall hooks,
        Python setup.py, Rust build.rs, etc. If the workflow also has secret access, a
        single compromised or typosquatted package can exfiltrate all credentials.

        ## Remediation
        - Use network egress filtering (e.g., StepSecurity Harden-Runner).
        - Isolate dependency installation in a job without secret access.
        - Use lockfiles with integrity checksums (`package-lock.json`, `poetry.lock`).
        - Consider vendoring critical dependencies.

        ## References
        - https://github.com/step-security/harden-runner
