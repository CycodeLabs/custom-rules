rules:
  - id: gh-actions-docker-build-arg-secrets
    message: >
      Secrets are passed to docker build via --build-arg. Build arguments are stored in
      image layer metadata and can be extracted by anyone with access to the image.
    severity: ERROR
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    pattern-either:
      - pattern-regex: '(?mis)^\s*-\s*run\s*:(?:[^\n]*|\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?)docker\s+build[^\n]*--build-arg[^\n]*\$\{\{\s*secrets\.'
      - patterns:
          - pattern-regex: '(?i)uses\s*:\s*docker/build-push-action@[^ \n]+'
          - pattern-regex: '(?i)build-args\s*:(?:.*\n)*.*\$\{\{\s*secrets\.'
    metadata:
      policy: "Secrets — Docker Build Layer Leakage"
      help: |
        ## Summary
        `--build-arg` values are recorded in image layer metadata and visible via
        `docker history` or `docker inspect`. Any secret passed this way is permanently
        embedded in the image and exposed to anyone who pulls it.

        ## Remediation
        Use BuildKit secret mounts instead:
        ```yaml
        - run: |
            DOCKER_BUILDKIT=1 docker build \
              --secret id=my_secret,env=MY_SECRET .
          env:
            MY_SECRET: ${{ secrets.MY_SECRET }}
        ```
        Or with `docker/build-push-action`:
        ```yaml
        - uses: docker/build-push-action@v5
          with:
            secrets: |
              "my_secret=${{ secrets.MY_SECRET }}"
        ```

        ## References
        - https://docs.docker.com/build/building/secrets/
