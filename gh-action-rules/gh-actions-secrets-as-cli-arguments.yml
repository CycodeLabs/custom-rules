rules:
  - id: gh-actions-secrets-as-cli-arguments
    message: >
      Secrets are interpolated directly into command-line arguments. Command arguments
      are visible in /proc, process listings, and audit logs, risking credential exposure.
    severity: ERROR
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    pattern-either:
      - pattern-regex: '(?mis)^\s*-\s*run\s*:[^\n]*(?:--password|--token|--secret|--key|--api-key|--auth|-p\s)\s*\$\{\{\s*secrets\.'
      - pattern-regex: '(?mis)^\s*-\s*run\s*:\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?.*(?:--password|--token|--secret|--key|--api-key|--auth|-p\s)\s*\$\{\{\s*secrets\.'
      - pattern-regex: '(?mis)^\s*-\s*run\s*:[^\n]*(?:--password|--token|--secret|--key|--api-key|--auth|-p)=\$\{\{\s*secrets\.'
      - pattern-regex: '(?mis)^\s*-\s*run\s*:\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?.*(?:--password|--token|--secret|--key|--api-key|--auth|-p)=\$\{\{\s*secrets\.'
    metadata:
      policy: "Secrets — Exposure via Process Arguments"
      help: |
        ## Summary
        Passing secrets as command-line flags (e.g., `--password ${{ secrets.X }}`) exposes
        them in `/proc/<pid>/cmdline`, `ps aux` output, and system audit logs on the runner.

        ## Remediation
        Pass secrets via environment variables instead:
        ```yaml
        - run: my-tool --password "$MY_SECRET"
          env:
            MY_SECRET: ${{ secrets.PASSWORD }}
        ```

        ## References
        - https://docs.github.com/en/actions/security-guides/using-secrets-in-github-actions#using-secrets-in-a-workflow
