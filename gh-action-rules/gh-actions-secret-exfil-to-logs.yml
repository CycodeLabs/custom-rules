rules:
  - id: gh-actions-secret-exfil-to-logs
    message: >
      Secrets are interpolated directly into a run block, or shell xtrace (set -x) is
      enabled. Both patterns risk leaking secret values into workflow logs.
    severity: ERROR
    languages:
      - yaml
    paths:
      include:
        - ".github/**"
        - "workflows/**"
    pattern-either:
      - pattern-regex: '(?m)^\s*-\s*run\s*:[^\n]*\$\{\{\s*secrets\.'
      - pattern-regex: '(?ms)^\s*-\s*run\s*:\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?.*\$\{\{\s*secrets\.'
      - pattern-regex: '(?ms)^\s*-\s*run\s*:(?:[^\n]*\bset\s+-x\b|\s*\|[^\n]*\n(?:(?:\s{2,}.*\n))*?.*\bset\s+-x\b)'
    metadata:
      policy: "Secrets — Exposure to Logs"
      help: |
        ## Summary
        Interpolating `${{ secrets.* }}` directly in shell commands means the value is
        embedded in the script before execution. If any command echoes it, or if `set -x`
        (xtrace) is enabled, the secret appears in plain text in workflow logs. GitHub masks
        known secret values, but masking is best-effort and can be bypassed with encoding.

        ## Remediation
        Pass secrets through environment variables and reference them as shell variables:
        ```yaml
        - run: my-command --token "$MY_TOKEN"
          env:
            MY_TOKEN: ${{ secrets.API_TOKEN }}
        ```
        Never enable `set -x` in steps that handle secrets.

        ## References
        - https://docs.github.com/en/actions/security-guides/using-secrets-in-github-actions
