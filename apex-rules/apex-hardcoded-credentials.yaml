rules:
  - id: apex-hardcoded-credentials
    message: >-
      Credentials or secrets are hardcoded in source code. Storing passwords,
      API keys, or tokens as string literals is insecure and exposes them to
      anyone with code access. Use Named Credentials, Custom Settings, or
      Custom Metadata Types.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "*.cls"
        - "*.trigger"
        - "*.apex"
      exclude:
        - "*Test*.cls"
        - "*_Test.cls"
        - "*Mock*.cls"
    pattern-either:
      - pattern-regex: "(?i)String\\s+\\w*(?:password|pwd|passwd)\\s*=\\s*['\"][^'\"]{8,}['\"]"
      - pattern-regex: "(?i)String\\s+\\w*(?:api_?key|secret_?key|auth_?token|access_?token)\\w*\\s*=\\s*['\"][^'\"]{10,}['\"]"
      - pattern-regex: "\\.setHeader\\s*\\(\\s*['\"]Authorization['\"],\\s*['\"](?:Bearer|Basic)\\s+[^'\"]{10,}['\"]"
      - pattern-regex: "(?i)(?:setEndpoint|HttpRequest|PageReference).*['\"]https?://[^'\"]*:[^'\"]*@[^'\"]*['\"]"
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      impact: HIGH
      vulnerability_class: Hardcoded Credentials
      references:
        - https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/apex_callouts_named_credentials.htm
      help: |
        ## Summary
        Credentials, API keys, or tokens are hardcoded as string literals in source code, exposing them to anyone with repository access.

        ## Remediation
        Use Named Credentials for callouts: `req.setEndpoint('callout:MyCredential/api')`. Store secrets in Protected Custom Settings or Custom Metadata Types, never in code.
