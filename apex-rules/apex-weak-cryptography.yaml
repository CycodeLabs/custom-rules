rules:
  - id: apex-weak-cryptography
    message: >-
      A weak or deprecated cryptographic algorithm is used (MD5, SHA1, DES,
      3DES, RC4). These algorithms have known vulnerabilities and can be
      broken with modern hardware. Use SHA-256+ for hashing and AES-256 for
      encryption.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "*.cls"
        - "*.trigger"
        - "*.apex"
    pattern-either:
      - pattern-regex: "Crypto\\.generateDigest\\s*\\(\\s*['\"](?:MD5|SHA1)['\"]"
      - pattern-regex: "Crypto\\.encrypt\\s*\\(\\s*['\"](?:DES|3DES|RC4)['\"]"
      - pattern-regex: "Crypto\\.generateMac\\s*\\(\\s*['\"](?:hmacMD5|hmacSHA1)['\"]"
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      impact: HIGH
      vulnerability_class: Weak Cryptography
      references:
        - https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/apex_classes_restful_crypto.htm
      help: |
        ## Summary
        Weak cryptographic algorithms (MD5, SHA1, DES, 3DES, RC4) are used which have known vulnerabilities and can be broken with modern hardware.

        ## Remediation
        Use `Crypto.generateDigest('SHA256', data)` for hashing. Use `Crypto.encrypt('AES256', key, data)` for encryption. Generate keys with `Crypto.generateAesKey(256)`.
