rules:
  - id: delphi-weak-hash-password
    message: >-
      MD5 or SHA1 is used for password hashing. These algorithms are
      cryptographically broken and can be cracked at billions of attempts
      per second with GPU hardware. Use bcrypt, scrypt, or Argon2 with
      unique per-password salts for password storage.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "*.pas"
        - "*.dpr"
        - "*.inc"
    pattern-either:
      - pattern-regex: "(?i)\\bTIdHashMessageDigest5\\b"
      - pattern-regex: "(?i)\\bTHashMD5\\.GetHash"
      - pattern-regex: "(?i)\\bTIdHashSHA1\\b"
      - pattern-regex: "(?i)\\bTHashSHA1\\.GetHash"
      - pattern-regex: "(?i)\\bTHashMD5\\.Create\\b"
      - pattern-regex: "(?i)\\bTIdHashSHA1\\.Create\\b"
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
        - "CWE-328: Use of Weak Hash"
      confidence: HIGH
      impact: HIGH
      vulnerability_class: Weak Cryptography
      references:
        - https://cwe.mitre.org/data/definitions/327.html
      help: |
        ## Summary
        MD5 or SHA1 is used for password hashing, which can be cracked at billions of attempts per second with modern GPU hardware.

        ## Remediation
        Use bcrypt, scrypt, or Argon2 with unique per-password salts. Libraries like Spring4D or DCPcrypt provide these. Never use MD5/SHA1 for password storage.
